<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — Мой сайт</title>
  <meta name="description" content="Свяжитесь с нами.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">EXAI.HUB</a>
      <button class="burger" aria-label="Меню"><span></span><span></span><span></span></button>
      <nav class="nav">
        <ul>
          <li><a href="index.html">Главная</a></li>
          <li><a href="about.html">О нас</a></li>
          <li><a href="contacts.html" class="active">Контакты</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h2>Контакты</h2>
        <p style="margin-bottom:30px;color:var(--muted)">Email: exai.hub@gmail.com · Тел: +7 977 112-33-21</p>
        <form class="form">
          <label for="name">Имя</label>
          <input type="text" id="name" required>
          <label for="email">Email</label>
          <input type="email" id="email" required>
          <label for="msg">Сообщение</label>
          <textarea id="msg" rows="5" required></textarea>
          <button type="submit" class="btn">Отправить</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">© 2026 EXAI Все права защищены.</div>
  </footer>

  <script src="js/main.js"></script>

</html>
